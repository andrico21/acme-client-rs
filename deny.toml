# https://embarkstudios.github.io/cargo-deny/

[advisories]
version = 2
ignore = [
    # RUSTSEC-2023-0071 (Marvin Attack): timing side-channel in `rsa` crate's
    # PKCS#1 v1.5 *decryption*. We use `rsa` (a direct dependency) only for
    # PKCS#1 v1.5 *signing* of ACME JWS payloads (src/jws.rs), never for
    # decryption — so the advisory does not apply to our usage. No fixed
    # version of `rsa` exists yet (tracked upstream); revisit on every
    # `rsa` upgrade and remove this ignore once a patched release ships.
    "RUSTSEC-2023-0071",
    # RUSTSEC-2026-0097 (rand unsoundness): `rand 0.8.5` is unsound when a
    # *custom global logger* calls `rand::rng()` during initialization. We
    # pull `rand 0.8.5` transitively via `rsa` → `num-bigint-dig` → `rand`,
    # and we do not install any custom global logger that invokes `rand`.
    # The unsoundness is therefore not reachable in our binary. No fixed
    # version is available; `rand 0.8.5` is the latest 0.8.x. Revisit when
    # the `rsa` ecosystem migrates to `rand 0.9`.
    "RUSTSEC-2026-0097",
]

[licenses]
version = 2
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "MIT",
    "Unicode-3.0",
    "Unlicense",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
