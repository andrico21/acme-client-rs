# https://embarkstudios.github.io/cargo-deny/

[advisories]
version = 2
ignore = [
    # rsa 0.9.10 Marvin Attack — transitive dep via rcgen, not used for RSA operations
    "RUSTSEC-2023-0071",
]

[licenses]
version = 2
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "MIT",
    "Unicode-3.0",
    "Unlicense",
]

[bans]
multiple-versions = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
