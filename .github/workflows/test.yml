name: Tests

on:
  push:
    branches: [dev, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Podman
        run: sudo apt-get update && sudo apt-get install -y podman

      - name: Run test suite
        run: |
          chmod +x test-podman.sh test.sh
          ./test-podman.sh
