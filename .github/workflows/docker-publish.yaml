name: Docker Publish

# Build and push the canonical distroless container image to Docker Hub on
# every release tag (matching `.github/workflows/release.yaml`'s tag trigger),
# and on manual `workflow_dispatch` runs for testing.
#
# First-iteration scope: linux/amd64 only. Multi-arch (linux/arm64) can be
# added later by enabling QEMU + buildx --platform linux/amd64,linux/arm64;
# expect ~20–30 min build time per arch under QEMU emulation.
#
# Required repository secrets:
#   DOCKERHUB_USERNAME — Docker Hub username (used as image namespace)
#   DOCKERHUB_TOKEN    — Docker Hub Personal Access Token with Read+Write

on:
  push:
    tags:
      - "*"
  workflow_dispatch:

permissions:
  contents: read

env:
  REGISTRY: docker.io
  IMAGE_NAME: acme-client-rs
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    name: Build & push container image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}
          # Tag generation strategy:
          #   semver tag "2.2.4" → :2.2.4, :2.2, :2, :latest
          #   workflow_dispatch on master → :master, :sha-abcdef
          # `flavor: latest=auto` adds :latest only for non-prerelease semver tags.
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=ref,event=branch
            type=sha,format=short,prefix=sha-
          flavor: |
            latest=auto

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Containerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Stamp the OCI image.version label with the semver `{{version}}`
          # output (e.g. "2.2.4"). For workflow_dispatch runs this falls back
          # to the branch name; the Containerfile defaults `VERSION=dev`.
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
          # Supply-chain hardening: emit SBOM + SLSA provenance attestations.
          sbom: true
          provenance: mode=max
          # GitHub Actions cache speeds up rebuilds across workflow runs.
          cache-from: type=gha
          cache-to: type=gha,mode=max
