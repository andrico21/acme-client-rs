name: Release

on:
  push:
    tags:
      - "*"
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-linux-gnu:
    name: Build Linux (x86_64, GNU)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - name: Install OpenSSL dev headers
        run: sudo apt update && sudo apt install -y pkg-config libssl-dev

      - name: Build
        run: cargo rustc --release -- -C relocation-model=pie -C link-args=-Wl,-z,relro,-z,now,-z,noexecstack

      - name: Strip binary
        run: strip target/release/acme-client-rs

      - name: Package
        run: |
          mkdir -p dist
          cp target/release/acme-client-rs dist/
          cd dist
          tar czf ../acme-client-rs-linux-x86_64-gnu.tar.gz acme-client-rs

      - uses: actions/upload-artifact@v7
        with:
          name: acme-client-rs-linux-x86_64-gnu
          path: acme-client-rs-linux-x86_64-gnu.tar.gz

  build-linux-musl:
    name: Build Linux (x86_64, musl, static)
    runs-on: ubuntu-24.04
    container:
      image: rust:alpine
    steps:
      - uses: actions/checkout@v6

      - name: Install build dependencies
        run: apk add --no-cache build-base pkgconf openssl openssl-dev openssl-libs-static perl make tar zstd

      - name: Build
        env:
          OPENSSL_STATIC: "1"
        run: cargo rustc --release -- -C relocation-model=pie -C link-args=-Wl,-z,relro,-z,now,-z,noexecstack

      - name: Strip binary
        run: strip target/release/acme-client-rs

      - name: Verify static linking
        run: |
          file target/release/acme-client-rs
          # Must be statically linked (output varies: "statically linked" or "static-pie linked")
          file target/release/acme-client-rs | grep -qE "statically linked|static-pie linked"

      - name: Package
        run: |
          mkdir -p dist
          cp target/release/acme-client-rs dist/
          cd dist
          tar czf ../acme-client-rs-linux-x86_64-musl.tar.gz acme-client-rs

      - uses: actions/upload-artifact@v7
        with:
          name: acme-client-rs-linux-x86_64-musl
          path: acme-client-rs-linux-x86_64-musl.tar.gz

  build-linux-aarch64-musl:
    name: Build Linux (aarch64, musl, static)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          platforms: arm64

      - name: Build in Alpine aarch64 container
        run: |
          docker run --rm --platform linux/arm64 \
            -v "$PWD":/work -w /work \
            rust:alpine sh -c '
              apk add --no-cache build-base pkgconf openssl openssl-dev openssl-libs-static perl make tar zstd
              OPENSSL_STATIC=1 cargo rustc --release -- -C relocation-model=pie -C link-args=-Wl,-z,relro,-z,now,-z,noexecstack
              strip target/release/acme-client-rs
              file target/release/acme-client-rs
              file target/release/acme-client-rs | grep -qE "statically linked|static-pie linked"
            '

      - name: Package
        run: |
          mkdir -p dist
          cp target/release/acme-client-rs dist/
          cd dist
          tar czf ../acme-client-rs-linux-aarch64-musl.tar.gz acme-client-rs

      - uses: actions/upload-artifact@v7
        with:
          name: acme-client-rs-linux-aarch64-musl
          path: acme-client-rs-linux-aarch64-musl.tar.gz

  build-linux-armv7-musl:
    name: Build Linux (armv7, musl, static)
    runs-on: ubuntu-24.04
    env:
      CROSS_TOOLCHAIN: /opt/armv7l-linux-musleabihf-cross
      OPENSSL_VERSION: "3.5.5"
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: armv7-unknown-linux-musleabihf

      - name: Install musl cross-compilation toolchain
        run: |
          curl -sSfL https://musl.cc/armv7l-linux-musleabihf-cross.tgz | sudo tar xzf - -C /opt
          echo "$CROSS_TOOLCHAIN/bin" >> $GITHUB_PATH

      - name: Cross-compile OpenSSL for armv7
        run: |
          curl -sSfL "https://github.com/openssl/openssl/releases/download/openssl-$OPENSSL_VERSION/openssl-$OPENSSL_VERSION.tar.gz" | tar xzf -
          cd openssl-$OPENSSL_VERSION
          ./Configure linux-armv4 no-shared no-async \
            --prefix=/opt/openssl-armv7 \
            --cross-compile-prefix=armv7l-linux-musleabihf-
          make -j$(nproc)
          sudo make install_sw

      - name: Build
        env:
          CARGO_TARGET_ARMV7_UNKNOWN_LINUX_MUSLEABIHF_LINKER: armv7l-linux-musleabihf-gcc
          CC_armv7_unknown_linux_musleabihf: armv7l-linux-musleabihf-gcc
          AR_armv7_unknown_linux_musleabihf: armv7l-linux-musleabihf-ar
          OPENSSL_STATIC: "1"
          OPENSSL_DIR: /opt/openssl-armv7
        run: cargo rustc --release --target armv7-unknown-linux-musleabihf -- -C relocation-model=pie -C link-args=-Wl,-z,relro,-z,now,-z,noexecstack

      - name: Strip binary
        run: armv7l-linux-musleabihf-strip target/armv7-unknown-linux-musleabihf/release/acme-client-rs

      - name: Verify static linking
        run: |
          file target/armv7-unknown-linux-musleabihf/release/acme-client-rs
          file target/armv7-unknown-linux-musleabihf/release/acme-client-rs | grep -qE "statically linked|static-pie linked"

      - name: Package
        run: |
          mkdir -p dist
          cp target/armv7-unknown-linux-musleabihf/release/acme-client-rs dist/
          cd dist
          tar czf ../acme-client-rs-linux-armv7-musl.tar.gz acme-client-rs

      - uses: actions/upload-artifact@v7
        with:
          name: acme-client-rs-linux-armv7-musl
          path: acme-client-rs-linux-armv7-musl.tar.gz

  build-macos-x86_64:
    name: Build macOS (x86_64)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Build
        run: cargo rustc --release --target x86_64-apple-darwin -- -C link-args=-Wl,-headerpad_max_install_names

      - name: Package
        run: |
          mkdir -p dist
          cp target/x86_64-apple-darwin/release/acme-client-rs dist/
          cd dist
          tar czf ../acme-client-rs-darwin-x86_64.tar.gz acme-client-rs

      - uses: actions/upload-artifact@v7
        with:
          name: acme-client-rs-darwin-x86_64
          path: acme-client-rs-darwin-x86_64.tar.gz

  build-macos-arm64:
    name: Build macOS (ARM64)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo rustc --release -- -C link-args=-Wl,-headerpad_max_install_names

      - name: Package
        run: |
          mkdir -p dist
          cp target/release/acme-client-rs dist/
          cd dist
          tar czf ../acme-client-rs-darwin-arm64.tar.gz acme-client-rs

      - uses: actions/upload-artifact@v7
        with:
          name: acme-client-rs-darwin-arm64
          path: acme-client-rs-darwin-arm64.tar.gz

  build-windows-msvc:
    name: Build Windows (x86_64, MSVC)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - name: Build
        env:
          RUSTFLAGS: "-C control-flow-guard=yes -C link-args=/DYNAMICBASE -C link-args=/HIGHENTROPYVA -C link-args=/NXCOMPAT -C link-args=/CETCOMPAT"
        run: cargo build --release

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item target\release\acme-client-rs.exe dist\
          Compress-Archive -Path dist\acme-client-rs.exe -DestinationPath acme-client-rs-windows-x86_64-msvc.zip

      - uses: actions/upload-artifact@v7
        with:
          name: acme-client-rs-windows-x86_64-msvc
          path: acme-client-rs-windows-x86_64-msvc.zip

  integration-test:
    name: Integration Test (Pebble)
    runs-on: ubuntu-latest
    needs: build-linux-musl
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: acme-client-rs-linux-x86_64-musl

      - name: Extract binary
        run: |
          tar xzf acme-client-rs-linux-x86_64-musl.tar.gz
          mkdir -p target/release
          mv acme-client-rs target/release/

      - name: Install Podman
        run: sudo apt update && sudo apt install -y podman

      - name: Run test suite
        run: |
          chmod +x tests/test-podman.sh tests/test.sh target/release/acme-client-rs
          ./tests/test-podman.sh --no-build

  release:
    name: Create Release
    needs: [build-linux-gnu, build-linux-musl, build-linux-aarch64-musl, build-linux-armv7-musl, build-macos-x86_64, build-macos-arm64, build-windows-msvc, integration-test]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v8
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2.6.1
        with:
          generate_release_notes: true
          files: |
            acme-client-rs-linux-x86_64-gnu.tar.gz
            acme-client-rs-linux-x86_64-musl.tar.gz
            acme-client-rs-linux-aarch64-musl.tar.gz
            acme-client-rs-linux-armv7-musl.tar.gz
            acme-client-rs-darwin-x86_64.tar.gz
            acme-client-rs-darwin-arm64.tar.gz
            acme-client-rs-windows-x86_64-msvc.zip
