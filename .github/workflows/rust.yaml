name: Rust

on:
  push:
    branches: [dev, master]
  pull_request:
    branches: [dev, master]

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-linux:
    name: Build & Test (Linux)
    runs-on: ubuntu-24.04
    container:
      image: rust:alpine
    steps:
      - uses: actions/checkout@v6

      - name: Install build dependencies
        run: apk add --no-cache build-base pkgconf openssl openssl-dev openssl-libs-static perl make tar zstd

      - name: Build
        run: cargo build --verbose

      - name: Run tests
        run: cargo test --verbose

  build-windows:
    name: Build & Test (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --verbose

      - name: Run tests
        run: cargo test --verbose

  integration-test:
    name: Integration Test (Pebble)
    runs-on: ubuntu-latest
    needs: build-linux
    steps:
      - uses: actions/checkout@v6

      - name: Install Podman
        run: sudo apt-get update && sudo apt-get install -y podman

      - name: Run test suite
        run: |
          chmod +x test-podman.sh test.sh
          ./test-podman.sh
