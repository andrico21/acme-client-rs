name: CI

on:
  push:
    branches: [dev, master]
  pull_request:
    branches: [dev, master]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: Check advisories, licenses, bans & sources
        run: cargo deny check

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      # --ignore mirrors the documented RUSTSEC-2023-0071 exception in
      # deny.toml (rsa Marvin attack: signing only, no decryption, no fixed
      # version upstream). Keep both files in sync when revisiting.
      - name: Audit RustSec advisories
        run: cargo audit --ignore RUSTSEC-2023-0071

  lint:
    name: Lint (fmt + clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96.0
          components: rustfmt, clippy

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Test-script output-safety lint
        run: bash tests/lint-output-safety.sh

  build-linux:
    name: Build & Test (Linux)
    runs-on: ubuntu-24.04
    container:
      image: rust:1.96.0-alpine
    steps:
      - uses: actions/checkout@v6

      - name: Install build dependencies
        run: apk add --no-cache build-base pkgconf openssl openssl-dev openssl-libs-static perl make tar zstd

      - name: Build
        run: cargo build --verbose

      - name: Run tests
        run: cargo test --verbose

      - name: Build release binary
        run: |
          cargo rustc --release -- -C relocation-model=pie -C link-args=-Wl,-z,relro,-z,now,-z,noexecstack
          strip target/release/acme-client-rs

      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          name: acme-client-rs-linux
          path: target/release/acme-client-rs
          retention-days: 1

  # Native arm64 coverage for Raspberry Pi 3/4/5 (64-bit OS) and other
  # aarch64 hosts. Build+test only: the x86 build-linux job keeps the sole
  # acme-client-rs-linux artifact consumed by integration-test.
  build-linux-arm64:
    name: Build & Test (Linux arm64)
    runs-on: ubuntu-24.04-arm
    container:
      image: rust:1.96.0-alpine
    steps:
      - uses: actions/checkout@v6

      - name: Install build dependencies
        run: apk add --no-cache build-base pkgconf openssl openssl-dev openssl-libs-static perl make tar zstd

      - name: Build
        run: cargo build --verbose

      - name: Run tests
        run: cargo test --verbose

  build-windows:
    name: Build & Test (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.96.0

      - name: Build
        env:
          RUSTFLAGS: "-C control-flow-guard=yes -C link-args=/DYNAMICBASE -C link-args=/HIGHENTROPYVA -C link-args=/NXCOMPAT -C link-args=/CETCOMPAT"
        run: cargo build --verbose

      - name: Run tests
        env:
          RUSTFLAGS: "-C control-flow-guard=yes -C link-args=/DYNAMICBASE -C link-args=/HIGHENTROPYVA -C link-args=/NXCOMPAT -C link-args=/CETCOMPAT"
        run: cargo test --verbose

  integration-test:
    name: Integration Test (Pebble)
    runs-on: ubuntu-latest
    needs: build-linux
    steps:
      - uses: actions/checkout@v6

      - name: Download binary
        uses: actions/download-artifact@v8
        with:
          name: acme-client-rs-linux
          path: target/release

      - name: Install Podman
        run: sudo apt update && sudo apt install -y podman

      - name: Run test suite
        run: |
          chmod +x tests/test-podman.sh tests/test.sh target/release/acme-client-rs
          ./tests/test-podman.sh --no-build
