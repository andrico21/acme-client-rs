name: CI

on:
  push:
    branches: [dev, master]
  pull_request:
    branches: [dev, master]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: Check advisories, licenses, bans & sources
        run: cargo deny check

  build-linux:
    name: Build & Test (Linux)
    runs-on: ubuntu-24.04
    container:
      image: rust:1.95.0-alpine
    steps:
      - uses: actions/checkout@v6

      - name: Install build dependencies
        run: apk add --no-cache build-base pkgconf openssl openssl-dev openssl-libs-static perl make tar zstd

      - name: Build
        run: cargo build --verbose

      - name: Run tests
        run: cargo test --verbose

      - name: Build release binary
        run: |
          cargo rustc --release -- -C relocation-model=pie -C link-args=-Wl,-z,relro,-z,now,-z,noexecstack
          strip target/release/acme-client-rs

      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          name: acme-client-rs-linux
          path: target/release/acme-client-rs
          retention-days: 1

  build-windows:
    name: Build & Test (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.95.0

      - name: Build
        env:
          RUSTFLAGS: "-C control-flow-guard=yes -C link-args=/DYNAMICBASE -C link-args=/HIGHENTROPYVA -C link-args=/NXCOMPAT -C link-args=/CETCOMPAT"
        run: cargo build --verbose

      - name: Run tests
        env:
          RUSTFLAGS: "-C control-flow-guard=yes -C link-args=/DYNAMICBASE -C link-args=/HIGHENTROPYVA -C link-args=/NXCOMPAT -C link-args=/CETCOMPAT"
        run: cargo test --verbose

  integration-test:
    name: Integration Test (Pebble)
    runs-on: ubuntu-latest
    needs: build-linux
    steps:
      - uses: actions/checkout@v6

      - name: Download binary
        uses: actions/download-artifact@v8
        with:
          name: acme-client-rs-linux
          path: target/release

      - name: Install Podman
        run: sudo apt update && sudo apt install -y podman

      - name: Run test suite
        run: |
          chmod +x tests/test-podman.sh tests/test.sh target/release/acme-client-rs
          ./tests/test-podman.sh --no-build
